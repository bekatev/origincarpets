name: Deploy to production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image on GitHub
        run: |
          docker build -t carp_carp:latest \
            --build-arg NEXT_PUBLIC_API_URL=https://origincarpets.com/api \
            -f Dockerfile .
          docker save carp_carp:latest | gzip > carp-image.tgz
          ls -lh carp-image.tgz

      - name: Upload image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: carp-image.tgz
          target: /tmp
          overwrite: true

      - name: Load image and restart on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            echo "==> Load Docker image"
            gunzip -c /tmp/carp-image.tgz | docker load
            rm -f /tmp/carp-image.tgz
            docker image prune -f >/dev/null 2>&1 || true
            git config --global --add safe.directory /opt/carp
            cd /opt/carp
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/bekatev/origincarpets.git
            fi
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy-migrate.sh
            docker-compose -f docker-compose.prod.yml up -d --force-recreate --no-build
            echo "==> Deploy complete"
