name: Deploy to production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image on GitHub
        run: |
          docker build -t carp_carp:latest \
            --build-arg NEXT_PUBLIC_API_URL=https://origincarpets.com/api \
            -f Dockerfile .
          docker save carp_carp:latest | gzip > carp-image.tgz
          ls -lh carp-image.tgz

      - name: Stream image to droplet and restart
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          echo "==> Stream image (no file saved on server disk)"
          cat carp-image.tgz | ssh $SSH_OPTS "${DROPLET_USER}@${DROPLET_HOST}" \
            'docker system prune -af >/dev/null 2>&1 || true; rm -f /tmp/carp-image.tgz; gunzip | docker load'
          echo "==> Migrate and restart"
          ssh $SSH_OPTS "${DROPLET_USER}@${DROPLET_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail
          git config --global --add safe.directory /opt/carp
          cd /opt/carp
          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/bekatev/origincarpets.git
          fi
          git fetch origin main
          git reset --hard origin/main
          bash scripts/deploy-migrate.sh
          docker-compose -f docker-compose.prod.yml up -d --force-recreate --no-build
          docker image prune -f >/dev/null 2>&1 || true
          echo "==> Deploy complete"
          REMOTE
