# Origin Carpets — new stack (Next.js + NestJS)
# Install: cp to /etc/nginx/sites-available/origincarpets-new && ln -sf ... sites-enabled/

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name origincarpets.com www.origincarpets.com;
  return 301 https://origincarpets.com$request_uri;
}

server {
  listen 443 ssl http2 default_server;
  listen [::]:443 ssl http2 default_server;
  server_name www.origincarpets.com;
  return 301 https://origincarpets.com$request_uri;

  ssl_certificate /etc/letsencrypt/live/origincarpets.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/origincarpets.com/privkey.pem;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name origincarpets.com;

  ssl_certificate /etc/letsencrypt/live/origincarpets.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/origincarpets.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 30M;

  # Legacy flat product uploads only (e.g. /abc123.jpg) — not /stock/ or /brand/
  location ~* ^/[^/]+\.(webp|jpg|jpeg|png|gif)$ {
    root /home/gdg/.carpets-data/uploads;
    try_files $uri @next;
  }

  location @next {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/proxy_params;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
